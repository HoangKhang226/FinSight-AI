version: "3.9"

services:
  # FastAPI Backend
  api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../storage:/app/storage
      - ../config:/app/config
      - ../logs:/app/logs
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    depends_on:
      - qdrant
    restart: unless-stopped

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ../storage/vector_db:/qdrant/storage
    restart: unless-stopped

  # Python Code Interpreter Sandbox
  sandbox:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.sandbox
    network_mode: "none"  # Cách ly hoàn toàn network
    restart: "no"
